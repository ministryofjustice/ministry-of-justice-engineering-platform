---
name: Lint

on:
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  actionlint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ACTIONLINT_VERSION: 1.7.7
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run actionlint
        run: |
          curl -sSfL -o actionlint.tar.gz "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar -xzf actionlint.tar.gz actionlint
          ./actionlint -color

  markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Run markdownlint
        run: |
          npm install --global markdownlint-cli2@0.18.1
          markdownlint-cli2 "**/*.md"

  yaml:
    name: YAML Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Run yamllint
        run: |
          python -m pip install yamllint==1.37.1
          cat <<'EOF' > .yamllint-ci.yml
          extends: default
          rules:
            line-length:
              max: 160
              level: warning
            truthy: disable
          EOF
          yamllint -c .yamllint-ci.yml .
